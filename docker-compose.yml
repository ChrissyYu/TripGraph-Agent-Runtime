services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tripplan-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PERSISTENCE_ENABLED: ${PERSISTENCE_ENABLED:-true}
      PERSISTENCE_DB_PATH: /app/data/persistence/executions.db
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      EVAL_ENABLED: ${EVAL_ENABLED:-true}
      EVAL_STORE_PATH: /app/data/eval
      LONG_TERM_STORE_PATH: /app/data/long_term_memory
    volumes:
      - tripplan-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional worker placeholder for future async job queue integration.
  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: ["python", "-c", "print('worker not configured')"]
  #   profiles: ["worker"]

  # Optional Redis for future caching / queue backends.
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   profiles: ["redis"]

volumes:
  tripplan-data:
